name: Backend

on:
  push:
    branches: [main]
    paths: ['api/**', .github/workflows/backend.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Terraform Outputs
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: infrastructure.yml
          name: terraform-outputs
          path: .
      
      - name: Load Terraform Outputs
        run: cat tf-outputs.env >> $GITHUB_ENV
      
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - uses: google-github-actions/setup-gcloud@v2
      
      - name: Build and Deploy
        working-directory: ./api
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
          
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:latest"
          
          docker build -t $IMAGE .
          docker push $IMAGE
          
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image $IMAGE \
            --region ${{ env.GCP_REGION }} \
            --platform managed