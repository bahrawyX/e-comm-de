name: Infrastructure

on:
  push:
    branches: [main]
    paths: ['infrastructure/**', .github/workflows/infrastructure.yml']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ./infrastructure
        run: |
          terraform plan -out=tfplan -no-color | tee plan.txt
      
      - name: Show Plan in Summary
        working-directory: ./infrastructure
        run: |
          echo '## Terraform Plan' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/tfplan
          retention-days: 5

  apply:
    runs-on: ubuntu-latest
    needs: plan
    environment: approval
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3
      
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet
      
      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init
      
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/
      
      - name: Terraform Apply
        working-directory: ./infrastructure
        run: terraform apply -auto-approve tfplan
      
      - name: Save Outputs
        working-directory: ./infrastructure
        run: |
          echo "ARTIFACT_REGISTRY_REPO=$(terraform output -raw artifact_registry_repository)" > tf-outputs.env
          echo "CLOUD_RUN_SERVICE=$(terraform output -raw cloud_run_service_name)" >> tf-outputs.env
          echo "FIREBASE_SITE_ID=$(terraform output -raw firebase_site_id)" >> tf-outputs.env
          echo "API_GATEWAY_HOSTNAME=$(terraform output -raw api_gateway_default_hostname)" >> tf-outputs.env
          echo "GCP_REGION=$(terraform output -raw gcp_region)" >> tf-outputs.env
          echo "GCP_PROJECT_ID=$(terraform output -raw gcp_project_id)" >> tf-outputs.env
      
      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: infrastructure/tf-outputs.env
          retention-days: 90