spring.application.name=DihEcommerceApp
server.servlet.context-path=/api
server.port=8080

# GCP TODO: Comment this line when transitioning to Google Cloud deployment
# spring.config.import=file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/e_comm
spring.datasource.username=postgres
spring.datasource.password=Dih@1234
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

# AWS RDS PostgreSQL configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# CORS configuration for Cloud deployment
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# SpringDoc / Swagger UI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# GCP API Gateway configuration
# Uncomment and set these when deploying to GCP:
# gcp.api-gateway.host=YOUR_GATEWAY_ID-HASH.REGION.gateway.dev
# gcp.api-gateway.backend-url=https://YOUR-CLOUD-RUN-URL.run.app/api

